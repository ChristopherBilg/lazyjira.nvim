name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check lua/ plugin/ tests/
      - uses: NTBBloodbath/selene-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          args: lua/ plugin/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install lua-language-server
        run: |
          TAG=$(curl -s https://api.github.com/repos/LuaLS/lua-language-server/releases/latest | jq -r .tag_name)
          mkdir -p "$HOME/lua-ls"
          curl -L "https://github.com/LuaLS/lua-language-server/releases/download/${TAG}/lua-language-server-${TAG}-linux-x64.tar.gz" \
            | tar xz -C "$HOME/lua-ls"
          echo "$HOME/lua-ls/bin" >> "$GITHUB_PATH"
      - name: Typecheck
        run: |
          lua-language-server --check . --checklevel=Warning --logpath=.luals-log
          if [ -f .luals-log/check.json ] && [ "$(cat .luals-log/check.json)" != "[]" ]; then
            cat .luals-log/check.json
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        neovim: [stable, nightly]
    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim }}
      - name: Run tests
        run: nvim --headless --noplugin -u tests/minimal_init.lua -c "lua MiniTest.run()"
